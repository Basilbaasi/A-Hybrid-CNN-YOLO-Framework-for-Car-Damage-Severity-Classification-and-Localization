<!DOCTYPE html>
<html>
<head>
<title>Car Damage Detection</title>
</head>

<body>

<h1>Car Damage Detection System</h1>

<form action="/predict" method="post" enctype="multipart/form-data">

<input type="file" name="file" required>

<br><br>

<button type="submit">Analyze</button>

</form>

{% if result_image %}

<h2>Result</h2>

<img src="{{ result_image }}" width="500">

<h2>Damage Severity: {{ severity }}</h2>

{% endif %}

</body>
</html>
